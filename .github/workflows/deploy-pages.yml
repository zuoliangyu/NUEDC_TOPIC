name: 自动部署到 GitHub Pages (链接到GitHub)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 docsify-cli
        run: npm i docsify-cli -g

      - name: 创建构建目录
        run: mkdir -p dist

      - name: 复制文档文件
        run: |
          cp README.md dist/
          cp -r 真题 dist/
          cp -r assets dist/
          cp -r 综合测评 dist/
          cp -r 参考资料 dist/

      - name: (最终版) 生成链接到GitHub的README文件
        run: |
          # 使用 GitHub Pages 直链（可内嵌 iframe，GitHub blob URL 禁止 iframe）
          BASE_URL="https://zuoliangyu.github.io/NUEDC_TOPIC"

          # 为每个年份目录创建README.md文件
          for year_dir in dist/真题/*/; do
            if [ -d "$year_dir" ]; then
              year=$(basename "$year_dir")
              readme_path="${year_dir}README.md"
              echo "# ${year}年全国大学生电子设计竞赛题目" > "$readme_path"
              echo "" >> "$readme_path"
              echo "## 📋 题目列表" >> "$readme_path"
              echo "" >> "$readme_path"
              
              # 【修改】查找文件并生成指向GitHub的完整URL链接
              find "$year_dir" -maxdepth 1 -type f | sort | while read -r file; do
                if [[ "$file" != *.md ]]; then
                  filename=$(basename "$file")
                  title=$(echo "$filename" | sed 's/\.[^.]*$//')
                  # 从 'dist/真题/2023/file.pdf' 中提取 '真题/2023/file.pdf'
                  repo_path=${file#dist/}
                  # URL编码路径以处理特殊字符
                  encoded_path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$repo_path'))")
                  echo "- [$title]($BASE_URL/$encoded_path)" >> "$readme_path"
                fi
              done
              
              echo "" >> "$readme_path"
              echo "---" >> "$readme_path"
              echo "[🔙 返回首页](/#/)" >> "$readme_path"
            fi
          done

          # 为综合测评目录创建README文件（仅列出各年份的题目PDF/DOC，跳过仿真文件和非题目目录）
          if [ -d "dist/综合测评/" ]; then
            readme_path="dist/综合测评/README.md"
            echo "# 全国大学生电子设计竞赛综合测评题目" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## 历年综合测评题目" >> "$readme_path"
            echo "" >> "$readme_path"

            # 只遍历年份目录（以20开头），跳过参考资料、电路仿真汇总等
            for topic_dir in dist/综合测评/20*/; do
              if [ -d "$topic_dir" ]; then
                topic=$(basename "$topic_dir")

                # 在汇总页追加条目
                echo "### $topic" >> "$readme_path"
                echo "" >> "$readme_path"
                find "$topic_dir" -maxdepth 1 -type f \( -name "*.pdf" -o -name "*.doc" -o -name "*.docx" \) | sort | while read -r file; do
                  filename=$(basename "$file")
                  title=$(echo "$filename" | sed 's/\.[^.]*$//')
                  repo_path=${file#dist/}
                  encoded_path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$repo_path'))")
                  echo "- [$title]($BASE_URL/$encoded_path)" >> "$readme_path"
                done
                echo "" >> "$readme_path"

                # 为每个年份单独生成 README.md
                topic_readme="${topic_dir}README.md"
                echo "# $topic" > "$topic_readme"
                echo "" >> "$topic_readme"
                echo "## 题目文件" >> "$topic_readme"
                echo "" >> "$topic_readme"
                find "$topic_dir" -maxdepth 1 -type f \( -name "*.pdf" -o -name "*.doc" -o -name "*.docx" \) | sort | while read -r file; do
                  filename=$(basename "$file")
                  title=$(echo "$filename" | sed 's/\.[^.]*$//')
                  repo_path=${file#dist/}
                  encoded_path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$repo_path'))")
                  echo "- [$title]($BASE_URL/$encoded_path)" >> "$topic_readme"
                done
                echo "" >> "$topic_readme"
                echo "---" >> "$topic_readme"
                echo "[🔙 返回综合测评](综合测评/)" >> "$topic_readme"
              fi
            done

            echo "---" >> "$readme_path"
            echo "[🔙 返回首页](/#/)" >> "$readme_path"
          fi

          # 为参考资料目录创建README文件
          if [ -d "dist/参考资料/" ]; then
            readme_path="dist/参考资料/README.md"
            echo "# 参考资料" > "$readme_path"
            echo "" >> "$readme_path"
            echo "以下资料可作为电赛备赛的参考用书。" >> "$readme_path"
            echo "" >> "$readme_path"
            find "dist/参考资料/" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              title=$(echo "$filename" | sed 's/\.[^.]*$//')
              repo_path=${file#dist/}
              encoded_path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$repo_path'))")
              echo "- [$title]($BASE_URL/$encoded_path)" >> "$readme_path"
            done
            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "[🔙 返回首页](/#/)" >> "$readme_path"
          fi

      - name: 创建 docsify 配置文件 (移除PDF插件)
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <title>全国大学生电子设计竞赛历年真题</title>
            <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
            <meta name="description" content="全国大学生电子设计竞赛历年真题在线浏览">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
            <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
            <link rel="icon" href="./assets/LOGO/NUEDC_LOGO.jpg">
          </head>
          <body>
            <div id="app">加载中...</div>
            <script>
              window.$docsify = {
                name: '电赛历年真题',
                repo: 'https://github.com/zuoliangyu/NUEDC_TOPIC',
                loadSidebar: true,
                subMaxLevel: 0,
                auto2top: true,
                search: {
                  placeholder: '搜索',
                  noData: '没有找到结果',
                  depth: 6
                },
                plugins: [
                  function(hook, vm) {
                    hook.beforeEach(function(html) {
                      return html + '\n\n----\n\n<footer style="text-align: center; margin-top: 20px; padding: 15px; border-top: 1px solid #eee; color: #666;">' +
                        '© 2025 全国大学生电子设计竞赛历年真题<br>' +
                        '📝 整理维护：<strong>左岚</strong><br>' +
                        '📺 <a href="https://space.bilibili.com/27619688" target="_blank" style="color: #00a1d6;">哔哩哔哩主页</a> | ' +
                        '🔗 <a href="https://github.com/zuoliangyu/NUEDC_TOPIC" target="_blank">GitHub 仓库</a><br>' +
                        '⏰ 更新时间: ' + new Date().toLocaleString('zh-CN') +
                        '</footer>';
                    });
                    hook.afterEach(function(html) {
                      return html.replace(
                        /<a\s+href="(https:\/\/zuoliangyu\.github\.io\/NUEDC_TOPIC\/[^"]+\.pdf)"([^>]*)>([^<]+)<\/a>/gi,
                        function(match, url, attrs, title) {
                          var id = 'pdf_' + Math.random().toString(36).substr(2, 8);
                          return '<a href="' + url + '" target="_blank">' + title + '</a> ' +
                            '<button onclick="var e=document.getElementById(\'' + id + '\');if(e.style.display===\'none\'){e.style.display=\'block\';this.textContent=\'取消预览\'}else{e.style.display=\'none\';this.textContent=\'预览\'}" ' +
                            'style="padding:2px 10px;font-size:12px;cursor:pointer;border:1px solid #42b983;border-radius:3px;color:#42b983;background:white;vertical-align:middle">预览</button>' +
                            '<div id="' + id + '" style="display:none;margin-top:10px">' +
                            '<iframe src="' + url + '" width="100%" height="800px" style="border:1px solid #ddd;border-radius:4px"></iframe>' +
                            '</div>';
                        }
                      );
                    });
                  }
                ]
              }
            </script>
            <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
            <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
            <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
            <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
            <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
            <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
          </body>
          </html>
          EOF

      - name: 生成侧边栏
        run: |
          python3 << 'EOF'
          import os

          lines = ["* [🏠 首页](/)\n", "\n"]

          lines.append("* 📚 历年真题\n")
          真题_dir = "dist/真题"
          year_dirs = sorted(
              [d for d in os.listdir(真题_dir) if os.path.isdir(os.path.join(真题_dir, d))],
              reverse=True
          )
          for year in year_dirs:
              lines.append(f"  * [{year} 年](真题/{year}/)\n")

          lines.append("\n")
          lines.append("* 🏆 综合测评\n")
          综合测评_dir = "dist/综合测评"
          topic_dirs = sorted(
              [d for d in os.listdir(综合测评_dir)
               if os.path.isdir(os.path.join(综合测评_dir, d)) and d.startswith("20")],
              reverse=True
          )
          for topic in topic_dirs:
              year = topic.split("-")[0]
              label = topic[len(year)+1:] if "-" in topic else topic
              lines.append(f"  * [{year} {label}](综合测评/{topic}/)\n")
          lines.append("\n")
          refs_dir = "dist/参考资料"
          if os.path.isdir(refs_dir):
              lines.append("* 📖 参考资料\n")
              lines.append("  * [查看全部参考资料](参考资料/)\n")
              lines.append("\n")

          lines.append("* 🔗 项目链接\n")
          lines.append("  * [GitHub 仓库](https://github.com/zuoliangyu/NUEDC_TOPIC)\n")

          with open("dist/_sidebar.md", "w", encoding="utf-8") as f:
              f.writelines(lines)

          print("_sidebar.md 生成成功！")
          EOF

      - name: 创建 .nojekyll 文件
        run: touch dist/.nojekyll

      - name: 部署到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true